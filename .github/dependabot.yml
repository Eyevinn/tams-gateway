version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # ESLint 10 (flat-config majors) needs a deliberate migration; pin to v9
      # until we take it on, so it doesn't block the dev-dependencies group.
      - dependency-name: eslint
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
