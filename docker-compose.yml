# Local backing services for development and the e2e smoke test.
# Start with: docker compose up -d
# Then run the gateway against them, e.g.:
#   DB_URL=http://localhost:5984 DB_USERNAME=admin DB_PASSWORD=password \
#   S3_ENDPOINT_URL=http://localhost:9000 S3_BUCKET=tams \
#   AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
#   pnpm start
# And exercise it with: node scripts/e2e.mjs

services:
  couchdb:
    image: couchdb:3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - '5984:5984'

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'

  # One-shot: create the bucket the gateway allocates objects in, then exit.
  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/tams;
      exit 0;
      "
